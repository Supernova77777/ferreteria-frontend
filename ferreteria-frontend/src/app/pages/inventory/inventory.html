<div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
    <h1>Inventario</h1>
    <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
        <div class="report-group"
            style="display: flex; align-items: center; background-color: #1e1e1e; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
            <input type="text" [(ngModel)]="searchQuery" placeholder="🔍 Buscar código o nombre..."
                class="search-input" />
            <select [(ngModel)]="selectedMarca"
                style="background-color: transparent; color: #e2e8f0; border: none; padding: 10px; font-size: 0.9rem; outline: none; cursor: pointer;">
                <option value="todas" style="background-color: #1e1e1e;">Todas las Marcas</option>
                <option *ngFor="let marca of marcasDisponibles" [value]="marca" style="background-color: #1e1e1e;">{{
                    marca }}</option>
            </select>
            <button class="report-btn" (click)="descargarInventario()" *ngIf="isAdmin()"
                style="background-color: #2196F3; color: white; border: none; padding: 10px 16px; cursor: pointer; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: background-color 0.2s;"
                onmouseover="this.style.backgroundColor='#1976D2'" onmouseout="this.style.backgroundColor='#2196F3'"
                title="Exportar Inventario a Word">
                📦 Descargar Inventario
            </button>
            <button class="report-btn excel" (click)="descargarInventarioExcel()" *ngIf="isAdmin()"
                style="background-color: #107c41; color: white; border: none; padding: 10px 16px; cursor: pointer; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: background-color 0.2s;"
                onmouseover="this.style.backgroundColor='#0c5c30'" onmouseout="this.style.backgroundColor='#107c41'"
                title="Exportar Inventario a Excel">
                📊 Descargar Excel
            </button>
        </div>
        <button class="btn-primary" (click)="openModal()" *ngIf="isAdmin()">
            + Nuevo Producto
        </button>
    </div>
</div>

<app-add-product-modal *ngIf="showModal" [editProduct]="productToEdit"
    (closeModal)="closeModal()"></app-add-product-modal>

<div class="card">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID Sistema</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Marca</th>
                    <th>Stock</th>
                    <th>Precio</th>
                    <th>Fecha Compra</th>
                    <th *ngIf="isAdmin()">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let product of filteredProducts">
                    <td>{{ product.id }}</td>
                    <td>{{ product.codigo || 'N/A' }}</td>
                    <td>{{ product.name }}</td>
                    <td>{{ product.marca }}</td>
                    <td>
                        <span class="badge" [ngClass]="{'low': product.stock < 10}">
                            {{ product.stock }}
                        </span>
                    </td>
                    <td>${{ product.price | number:'1.2-2' }}</td>
                    <td>{{ product.fechaCompra || 'N/A' }}</td>
                    <td *ngIf="isAdmin()">
                        <button class="action-btn" (click)="openModal(product)">✏️</button>
                        <button class="action-btn delete" (click)="deleteProduct(product.id)">🗑️</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
